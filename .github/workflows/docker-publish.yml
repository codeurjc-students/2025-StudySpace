name: CD Docker Publish

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "images/**"
      - "README.md"
  release:
    types: [published]
  workflow_dispatch:

env:
  DOCKER_IMAGE_APP: ${{ secrets.DOCKER_USERNAME }}/studyspace-app
  DOCKER_IMAGE_CONFIG: ${{ secrets.DOCKER_USERNAME }}/studyspace-compose

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine Docker Tags
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION=${{ github.event.release.tag_name }}
            VERSION=${VERSION#v}
            
            echo "TAGS_APP=${{ env.DOCKER_IMAGE_APP }}:${VERSION},${{ env.DOCKER_IMAGE_APP }}:latest" >> $GITHUB_ENV
            echo "TAG_OCI=${VERSION}" >> $GITHUB_ENV
            echo "IS_RELEASE=true" >> $GITHUB_ENV

          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TAGS_APP=${{ env.DOCKER_IMAGE_APP }}:dev" >> $GITHUB_ENV
            echo "TAG_OCI=dev" >> $GITHUB_ENV
            echo "IS_RELEASE=false" >> $GITHUB_ENV

          else
            TIMESTAMP=$(date +%Y%m%d-%H%M)
            SHORT_SHA=$(git rev-parse --short HEAD)
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            SAFE_BRANCH=$(echo $BRANCH_NAME | tr / -)
            CUSTOM_TAG="${SAFE_BRANCH}-${TIMESTAMP}-${SHORT_SHA}"
            
            echo "TAGS_APP=${{ env.DOCKER_IMAGE_APP }}:${CUSTOM_TAG}" >> $GITHUB_ENV
            echo "TAG_OCI=${CUSTOM_TAG}" >> $GITHUB_ENV
            echo "IS_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Build and push Unified App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ env.TAGS_APP }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package Docker Compose as OCI Artifact
        run: |
          # Empty image
          echo "FROM scratch" > Dockerfile.oci
          echo "COPY docker/docker-compose.yml /docker-compose.yml" >> Dockerfile.oci

          # tag (dev, 0.1.0, etc)
          docker build -f Dockerfile.oci -t ${{ env.DOCKER_IMAGE_CONFIG }}:${{ env.TAG_OCI }} .
          docker push ${{ env.DOCKER_IMAGE_CONFIG }}:${{ env.TAG_OCI }}

          if [[ "${{ env.IS_RELEASE }}" == "true" ]]; then
            docker tag ${{ env.DOCKER_IMAGE_CONFIG }}:${{ env.TAG_OCI }} ${{ env.DOCKER_IMAGE_CONFIG }}:latest
            docker push ${{ env.DOCKER_IMAGE_CONFIG }}:latest
          fi
