<div class="container mt-5 mb-5 d-flex justify-content-center">
  <div class="card shadow p-4 reservation-card">
    <h3 class="mb-4 text-center text-primary">Make a Reservation</h3>
    <p class="text-center text-muted">
      You are booking the classroom #{{ roomId }}
    </p>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label
          class="form-label fw-bold fs-5 text-dark border-bottom pb-2 w-100"
        >
          <i class="fa fa-map-marker text-primary me-2"></i>1. Find and Select a
          Room
        </label>

        <div class="card bg-light border-0 shadow-sm mb-3">
          <div class="card-body py-2 px-3">
            <div class="row g-2 align-items-end">
              <div class="col-md-4">
                <label class="form-label small fw-bold text-secondary mb-1"
                  >Search</label
                >
                <div class="input-group input-group-sm">
                  <span class="input-group-text bg-white"
                    ><i class="fa fa-search text-muted"></i
                  ></span>
                  <input
                    type="text"
                    class="form-control border-start-0"
                    placeholder="Name, software..."
                    [(ngModel)]="roomSearchText"
                    name="roomSearch"
                    (ngModelChange)="searchRooms()"
                    (keydown.enter)="$event.preventDefault(); searchRooms()"
                  />
                </div>
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-bold text-secondary mb-1"
                  >Campus</label
                >
                <select
                  class="form-select form-select-sm"
                  name="campusSearch"
                  [(ngModel)]="selectedCampus"
                  (change)="searchRooms()"
                >
                  <option value="">All</option>
                  <option value="ALCORCON">Alcorcón</option>
                  <option value="MOSTOLES">Móstoles</option>
                  <option value="VICALVARO">Vicálvaro</option>
                  <option value="FUENLABRADA">Fuenlabrada</option>
                  <option value="QUINTANA">Quintana</option>
                </select>
              </div>
              <div class="col-md-2">
                <label class="form-label small fw-bold text-secondary mb-1"
                  >Min. Cap.</label
                >
                <input
                  type="number"
                  class="form-control form-control-sm"
                  name="capSearch"
                  [(ngModel)]="minCapacity"
                  placeholder="e.g. 20"
                  (keydown.enter)="$event.preventDefault(); searchRooms()"
                />
              </div>
              <div class="col-md-3 d-flex gap-1">
                <button
                  type="button"
                  class="btn btn-primary btn-sm w-100 shadow-sm"
                  (click)="searchRooms()"
                >
                  Filter
                </button>
                <button
                  type="button"
                  class="btn btn-outline-secondary btn-sm"
                  *ngIf="roomSearchText || selectedCampus || minCapacity"
                  (click)="clearRoomSearch()"
                >
                  ✖
                </button>
              </div>
            </div>
          </div>
        </div>

        <p class="text-muted small mb-2">
          <i class="fa fa-info-circle text-primary"></i>
          Showing <strong>{{ visibleRooms.length }}</strong> available rooms.
          Click on a room to select it.
        </p>

        <div
          class="list-group shadow-sm border border-primary border-opacity-25"
          style="max-height: 250px; overflow-y: auto"
        >
          <button
            *ngFor="let r of visibleRooms"
            type="button"
            class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
            [class.active]="roomId === r.id"
            [class.bg-primary]="roomId === r.id"
            (click)="selectRoom(r)"
          >
            <div [class.text-white]="roomId === r.id">
              <strong class="fs-5">{{ r.name }}</strong>
              <span
                class="badge ms-2"
                [class.bg-light]="roomId === r.id"
                [class.text-primary]="roomId === r.id"
                [class.bg-info]="roomId !== r.id"
                [class.text-dark]="roomId !== r.id"
              >
                {{ r.camp }}
              </span>
              <br />
              <small
                [class.text-white-50]="roomId === r.id"
                [class.text-muted]="roomId !== r.id"
              >
                <i class="fa fa-users me-1"></i> Capacity: {{ r.capacity }} |
                <i class="fa fa-map-marker ms-2 me-1"></i> {{ r.place }}
              </small>
            </div>

            <i
              *ngIf="roomId === r.id"
              class="fa fa-check-circle fs-2 text-white shadow-sm rounded-circle"
            ></i>
          </button>

          <div
            *ngIf="visibleRooms.length === 0"
            class="list-group-item text-muted text-center py-4 bg-light"
          >
            <i class="fa fa-frown-o fs-3 mb-2 d-block text-secondary"></i>
            No rooms found matching your search filters.
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label for="dateSelect" class="form-label fw-bold"
          >2. Select Date</label
        >
        <input
          type="date"
          id="dateSelect"
          name="selectedDate"
          [(ngModel)]="selectedDate"
          (change)="onConfigChange()"
          [min]="minDate"
          class="form-control"
          required
        />
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="startTime" class="form-label fw-bold"
            >3. Start Time</label
          >
          <select
            id="startTime"
            name="startTime"
            [(ngModel)]="selectedStartTime"
            (change)="onStartTimeChange()"
            class="form-select"
            [disabled]="!roomId || !selectedDate"
            required
          >
            <option value="" disabled>-- Select Start --</option>
            <option *ngFor="let t of startTimes" [value]="t">{{ t }}</option>
          </select>
          <div
            *ngIf="roomId && selectedDate && startTimes.length === 0"
            class="text-danger small mt-1"
          >
            No available slots for this day.
          </div>
        </div>

        <div class="col-md-6 mb-3">
          <label for="endTime" class="form-label fw-bold">4. End Time</label>
          <select
            id="endTime"
            name="endTime"
            [(ngModel)]="selectedEndTime"
            class="form-select"
            [disabled]="!selectedStartTime"
            required
          >
            <option value="" disabled>-- Select End --</option>
            <option *ngFor="let t of endTimes" [value]="t">{{ t }}</option>
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label for="reason" class="form-label fw-bold">Reason</label>
        <textarea
          id="reason"
          name="reason"
          [(ngModel)]="reason"
          class="form-control"
          rows="3"
          placeholder="Class purpose..."
        ></textarea>
      </div>

      <div class="d-flex justify-content-between mt-4">
        <button type="button" class="btn btn-secondary" routerLink="/">
          Cancel
        </button>
        <button
          type="submit"
          class="btn btn-success"
          [disabled]="!roomId || !selectedStartTime || !selectedEndTime"
        >
          Confirm Reservation
        </button>
      </div>
    </form>
  </div>
</div>
