<div class="container mt-5">
  <h2 class="mb-4">Manage Users</h2>

  <div class="card bg-light border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-2 mb-3">
        <div class="col-md-5">
          <input
            type="text"
            class="form-control"
            placeholder="Search by name, email..."
            [(ngModel)]="searchText"
            (keyup.enter)="onSearch()"
          />
        </div>
        <div class="col-md-3">
          <select class="form-select" [(ngModel)]="filterType">
            <option value="">All Roles</option>
            <option value="ADMIN">Admins Only</option>
            <option value="USER">Normal Users</option>
          </select>
        </div>
        <div class="col-md-2">
          <select class="form-select" [(ngModel)]="filterBlocked">
            <option value="">All Status</option>
            <option value="true">Blocked</option>
            <option value="false">Active</option>
          </select>
        </div>
        <div class="col-md-2 d-flex gap-2">
          <button class="btn btn-primary w-100" (click)="onSearch()">
            Search
          </button>
          <button
            class="btn btn-outline-secondary"
            *ngIf="isSearching"
            (click)="clearSearch()"
          >
            ✖
          </button>
        </div>
      </div>

      <div class="row g-2 align-items-center">
        <div class="col-md-3 text-secondary text-md-end pe-2">
          <small class="fw-bold"
            ><i class="fa fa-calendar-check-o"></i> Find by Reservations:</small
          >
        </div>
        <div class="col-md-5">
          <input
            type="text"
            class="form-control form-control-sm"
            placeholder="Any booked room name (e.g. Lab A1)..."
            [(ngModel)]="filterRoom"
            (ngModelChange)="onRoomSearchChange()"
            (keyup.enter)="onSearch()"
            list="roomSuggestions"
          />
          <datalist id="roomSuggestions">
            <option *ngFor="let r of availableRooms" [value]="r.name"></option>
          </datalist>
        </div>
        <div class="col-md-4">
          <input
            type="date"
            class="form-control form-control-sm text-muted"
            [(ngModel)]="filterDate"
            (change)="onSearch()"
          />
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-align-middle mb-0 table-hover">
        <thead class="table-light">
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Status</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users" [class.table-danger]="user.blocked">
            <td>
              <div class="d-flex align-items-center">
                <img
                  [src]="
                    user.imageName
                      ? 'https://localhost:8443/api/users/' + user.id + '/image'
                      : 'assets/user_placeholder.png'
                  "
                  alt="Avatar of {{ user.name }}"
                  class="rounded-circle me-2 avatar-img"
                  (error)="user.imageName = undefined"
                />
                <strong>{{ user.name }}</strong>
                <span
                  *ngIf="user.roles.includes('ADMIN')"
                  class="badge bg-primary ms-2"
                  >ADMIN</span
                >
              </div>
            </td>
            <td>{{ user.email }}</td>
            <td>
              <span *ngIf="user.blocked" class="badge bg-danger">Blocked</span>
              <span *ngIf="!user.blocked" class="badge bg-success">Active</span>
            </td>
            <td>
              <div class="d-flex justify-content-center gap-2">
                <button
                  class="btn btn-sm btn-outline-info"
                  (click)="viewReservations(user)"
                  title="View User Reservations"
                >
                  📅 Bookings
                </button>

                <button
                  *ngIf="user.email !== 'studyspacetfg@gmail.com'"
                  class="btn btn-sm btn-outline-primary"
                  (click)="toggleAdmin(user)"
                  title="Toggle Admin"
                >
                  {{
                    user.roles.includes("ADMIN")
                      ? "⬇️ Revoke Admin"
                      : "⬆️ Make Admin"
                  }}
                </button>

                <button
                  *ngIf="user.email !== 'studyspacetfg@gmail.com'"
                  class="btn btn-sm"
                  [class.btn-outline-dark]="!user.blocked"
                  [class.btn-success]="user.blocked"
                  (click)="toggleBlock(user)"
                  title="Block/Unblock"
                >
                  {{ user.blocked ? "🔓 Unblock" : "🚫 Block" }}
                </button>

                <button
                  *ngIf="user.email !== 'studyspacetfg@gmail.com'"
                  class="btn btn-sm btn-outline-danger"
                  (click)="deleteUser(user)"
                  title="Delete User"
                >
                  🗑️ Delete
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="users.length === 0">
            <td colspan="4" class="text-center py-3 text-muted">
              No users found on this page.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <app-pagination
    *ngIf="pageData"
    [pageData]="pageData"
    [currentPage]="currentPage"
    (pageChange)="loadUsers($event)"
  >
  </app-pagination>

  <div class="d-flex justify-content-start mb-5 mt-4">
    <button class="btn btn-outline-secondary" routerLink="/">
      &laquo; Back to Home
    </button>
  </div>
</div>
