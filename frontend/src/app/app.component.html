<header class="navbar">
  <div class="navbar-left">
    <h1 class="logo" style="cursor: pointer" [routerLink]="['/']">
      StudySpace
    </h1>
  </div>

  <div class="navbar-right">
    <ng-container *ngIf="!loginService.isLogged()">
      <button
        class="btn btn-light text-primary btn-lg fw-bold px-4 shadow-sm border-0 me-3"
        (click)="goToLogIn()"
      >
        Log In
      </button>
      <button
        class="btn btn-light text-primary btn-lg fw-bold px-4 shadow-sm border-0"
        routerLink="/register"
      >
        Register
      </button>
    </ng-container>

    <div
      *ngIf="loginService.isAdmin()"
      ngbDropdown
      placement="bottom-end"
      class="d-inline-block ms-3"
    >
      <button
        class="btn btn-light text-primary btn-lg fw-bold px-4 shadow-sm border-0"
        id="dropdownAdmin"
        ngbDropdownToggle
      >
        <i class="bi bi-gear-fill me-1"></i> Admin Panel
      </button>

      <div ngbDropdownMenu aria-labelledby="dropdownAdmin" class="shadow mt-2">
        <button ngbDropdownItem routerLink="/admin/rooms" class="py-2">
          <i class="bi bi-door-open me-2 text-primary"></i> Manage Rooms
        </button>
        <button ngbDropdownItem routerLink="/admin/softwares" class="py-2">
          <i class="bi bi-pc-display me-2 text-info"></i> Manage Software
        </button>
        <button ngbDropdownItem routerLink="/admin/users" class="py-2">
          <i class="bi bi-people-fill me-2 text-success"></i> Manage Users
        </button>
        <div class="dropdown-divider"></div>
        <button ngbDropdownItem routerLink="/admin/stats" class="py-2">
          <i class="bi bi-bar-chart-fill me-2 text-warning"></i> Occupancy Stats
        </button>
      </div>
    </div>

    <div
      *ngIf="loginService.isLogged()"
      ngbDropdown
      placement="bottom-end"
      class="d-inline-block ms-3"
    >
      <button
        type="button"
        class="btn p-0 no-arrow d-flex flex-column align-items-center"
        id="dropdownProfile"
        ngbDropdownToggle
      >
        <img
          [src]="getUserImageUrl()"
          alt="Profile"
          class="rounded-circle profile-icon-header"
          style="
            width: 50px;
            height: 50px;
            object-fit: cover;
            border: 2px solid white;
          "
          (error)="
            loginService.currentUser &&
              (loginService.currentUser.imageName = undefined)
          "
        />

        <span
          class="text-white small mt-1"
          style="font-size: 0.95rem; font-weight: 600"
        >
          {{ loginService.currentUser?.name }}
        </span>
      </button>

      <div
        ngbDropdownMenu
        aria-labelledby="dropdownProfile"
        class="p-3 shadow dropdown-menu-end"
        style="min-width: 250px"
      >
        <div class="text-center mb-3">
          <img
            [src]="getUserImageUrl()"
            alt="Profile"
            class="rounded-circle mb-2 shadow-sm"
            style="width: 80px; height: 80px; object-fit: cover"
            (error)="
              loginService.currentUser &&
                (loginService.currentUser.imageName = undefined)
            "
          />

          <h5 class="mb-1 fw-bold">{{ loginService.currentUser?.name }}</h5>

          <a
            [routerLink]="['/profile']"
            class="btn btn-sm btn-primary mt-2 w-100"
          >
            View My Profile
          </a>
        </div>

        <div class="dropdown-divider"></div>

        <button
          (click)="loginService.logOut()"
          ngbDropdownItem
          class="text-danger py-2 text-center border rounded mt-2 btn-outline-danger"
        >
          Log out
        </button>
      </div>
    </div>
  </div>
</header>

<main>
  <router-outlet></router-outlet>
</main>
