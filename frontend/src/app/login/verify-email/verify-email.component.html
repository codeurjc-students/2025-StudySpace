<div class="container mt-5 text-center verify-container">
  <div
    *ngIf="loading"
    class="d-flex flex-column align-items-center justify-content-center"
  >
    <output class="spinner-border text-primary verify-spinner">
      <span class="visually-hidden">Verifying...</span>
    </output>
    <p class="mt-3 text-muted">Verifying your email address, please wait...</p>
  </div>

  <div *ngIf="!loading">
    <div *ngIf="success" class="card shadow-sm border-success">
      <div class="card-body p-5">
        <div class="mb-4 text-success">
          <i class="bi bi-check-circle-fill verify-icon"></i>
        </div>
        <h2 class="card-title text-success mb-3">Email Verified!</h2>
        <p class="card-text text-muted">
          Your account has been successfully activated. Welcome to StudySpace!
        </p>
        <button class="btn btn-success btn-lg mt-4 px-5" routerLink="/login">
          Go to Log In
        </button>
      </div>
    </div>

    <div *ngIf="!success" class="card shadow-sm border-danger">
      <div class="card-body p-5">
        <div class="mb-4 text-danger">
          <i class="bi bi-x-circle-fill verify-icon"></i>
        </div>
        <h2 class="card-title text-danger mb-3">Verification Failed</h2>
        <p class="card-text text-muted mb-4">
          {{ errorMessage }}
        </p>
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
          <button class="btn btn-outline-secondary" routerLink="/">
            Go Home
          </button>
          <button class="btn btn-primary" routerLink="/register">
            Register Again
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
