version: "3.8"

services:
  # Load Balancer HAProxy
  haproxy:
    image: haproxy:2.8
    container_name: haproxy_loadbalancer
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      - study-space

  study-space:
    image: ${DOCKER_USERNAME}/studyspace-app:${TAG:-latest}
    restart: always
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/study_space_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET_KEY}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      NORMAL_PASSWORD: ${NORMAL_PASSWORD}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}

      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: studyspace-images
    deploy:
      replicas: 3
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started

  # Database MySQL
  mysql:
    image: mysql:8.0
    container_name: study_space_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: study_space_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  minio:
    image: minio/minio
    container_name: study_space_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc
    container_name: study_space_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to start...';
      until /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}; do
        sleep 2;
      done;
      echo 'MinIO done. Configuring bucket...';
      /usr/bin/mc mb myminio/studyspace-images --ignore-existing;
      /usr/bin/mc anonymous set download myminio/studyspace-images;
      exit 0;
      "

volumes:
  mysql_data:
  minio_data:
