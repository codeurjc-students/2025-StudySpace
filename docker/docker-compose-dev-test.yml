version: "3.8"

services:
  haproxy:
    image: haproxy:2.8
    container_name: haproxy_loadbalancer_test
    ports:
      - "443:443"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      - study-space

  study-space:
    image: guiller25/studyspace-app:test-native1
    expose:
      - "8080"
    environment:
      # AHORA APUNTA A LA BASE DE DATOS LOCAL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-test:3306/study_space_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET_KEY}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      NORMAL_PASSWORD: ${NORMAL_PASSWORD}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    deploy:
      replicas: 1
    depends_on:
      mysql-test:
        condition: service_healthy

  # BASE DE DATOS TEMPORAL PARA QUE NO FALLE LA CONEXIÓN
  mysql-test:
    image: mysql:8.0
    container_name: study_space_mysql_test
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: study_space_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10