global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

# load balancer listening on port 443
frontend https_front
    bind *:443 ssl crt /etc/ssl/certs/studyspace.pem
    default_backend springboot_replicas

# Docker DNS resolution to find dynamic replicas
resolvers docker
    nameserver dns1 127.0.0.11:53
    hold valid 10s

backend springboot_replicas
    balance roundrobin
    # Dynamically searches for the IPs of containers named 'study-space'
    server-template study-space 3 study-space:8080 check resolvers docker init-addr libc,none


