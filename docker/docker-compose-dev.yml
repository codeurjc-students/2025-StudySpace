version: "3.8"

services:
  # Load Balancer HAProxy
  haproxy:
    image: haproxy:2.8
    container_name: haproxy_loadbalancer
    ports:
      - "443:443"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      # certs for certificate
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      - study-space

  study-space:
    build:
      context: ../ # root of the project
      dockerfile: docker/Dockerfile
    expose:
      - "8080" # port for docker
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://studyspace-db.cn04akqkqswq.eu-south-2.rds.amazonaws.com:3306/study_space_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET_KEY}

      MAIL_PASSWORD: ${MAIL_PASSWORD}
      NORMAL_PASSWORD: ${NORMAL_PASSWORD}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    deploy:
      replicas: 3 # 3 containersof the same app

