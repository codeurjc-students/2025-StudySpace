spring.profiles.active=test

# Allow beans defined in test configuration to override production beans
spring.main.allow-bean-definition-overriding=true

# Disable Hibernate Search bulk indexing in tests (extra safeguard)
search.index.bulk.enabled=false

# Disable database initializer during tests
app.db.init.enabled=false

# Use H2 in-memory database for tests so Spring Data repositories are available
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# dummy mail user to satisfy EmailService
spring.mail.username=test@example.com

# storage location required by FileStorageService placeholder
storage.location=./target/test-storage

# for artillery a bigger pool for test of concurrency
spring.datasource.hikari.maximum-pool-size=50


#MinIO SetUp for tests 
minio.url=http://localhost:9000
minio.access-key=test-access-key
minio.secret-key=test-secret-key
app.minio.bucket=studyspace-images
