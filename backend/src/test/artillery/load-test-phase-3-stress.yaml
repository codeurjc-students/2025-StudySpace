Resources:
  # CLUSTER ECS 
  StudySpaceCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: studyspace-cluster

  # IAM ROLES
  # Execution Role: Allows ECS to download your Docker Hub image and send logs to CloudWatch
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  #Task Role: Allows your application (Spring Boot) to access S3
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  # TASK DEFINITION (docker-compose.yml for AWS)
  StudySpaceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: studyspace-app-task
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: 512    # 0.5 vCPU 
      Memory: 1024 # 1 GB RAM 
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: studyspace-app
          Image: guiller25/studyspace-app:test-aws9
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            # Here we inject the variables exactly as they were on the EC2
            - Name: APP_FRONTEND_URL
              Value: !Sub "http://${ALB.DNSName}" # will point to the Load Balancer 
            - Name: SPRING_DATASOURCE_URL
              Value: !Sub "jdbc:mysql://${StudySpaceDB.Endpoint.Address}:3306/study_space_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true"
            - Name: SPRING_DATASOURCE_USERNAME
              Value: admin
            - Name: SPRING_DATASOURCE_PASSWORD
              Value: !Ref DBPassword
            - Name: MINIO_BUCKET
              Value: !Ref StudySpaceBucket
            - Name: JWT_SECRET
              Value: !Ref JWTSecret
            - Name: MAIL_PASSWORD
              Value: !Ref MailPassword
            - Name: APP_DB_INIT_ENABLED
              Value: "true"
            - Name: SPRING_JPA_HIBERNATE_DDL_AUTO
              Value: "update"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/studyspace
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  #Log Group for CloudWatch
  StudySpaceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/studyspace
      RetentionInDays: 7 #delete to avoid paiments

  # ECS (Keeps replicas alive)
  StudySpaceService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref StudySpaceCluster
      ServiceName: studyspace-service
      TaskDefinition: !Ref StudySpaceTaskDefinition
      DesiredCount: 2 # start replicas
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets:
            - !Ref PublicSubnet1 
            - !Ref PublicSubnet2
      LoadBalancers:
        - ContainerName: studyspace-app
          ContainerPort: 8080
          TargetGroupArn: !Ref ALBTargetGroup # Connection to the balancer 

  # AUTO-SCALING POLICIES
  StudySpaceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 10 # Maximum replica limit
      MinCapacity: 2
      ResourceId: !Sub "service/${StudySpaceCluster}/${StudySpaceService.Name}"
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  StudySpaceScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: CPU-AutoScaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref StudySpaceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0 # When the cluster average exceeds 70%, it will grow
        ScaleInCooldown: 120 # Seconds of waiting before turning off replicas after a peak
        ScaleOutCooldown: 60 # Seconds of waiting before turning on new replicas