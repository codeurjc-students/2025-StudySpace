# test Docker  (port 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/study_space_e2e_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:toor}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect




server.port=8080




# --- MailHog config for tests E2E ---
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false


# for artillery a bigger pool for test of concurrency
spring.datasource.hikari.maximum-pool-size=50

#MinIO SetUp for tests E2E
minio.url=http://localhost:9000
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadminpassword}
app.minio.bucket=studyspace-images